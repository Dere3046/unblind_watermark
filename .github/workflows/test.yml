name: test

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - run: pip install numpy opencv-python pywavelets pytest

      - run: PYTHONPATH=blind_watermark python -m pytest uw/tests -v
